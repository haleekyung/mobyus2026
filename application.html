<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply - MOBYUS</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/career.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Pretendard+Variable:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Simple Header for Application Page -->
    <header class="application-header">
        <div class="container">
            <a href="index.html" class="logo">MOBYUS</a>
        </div>
    </header>

    <main class="application-page">
        <div class="container">
            <div class="application-form-container fade-in">
                <div class="form-header text-center">
                    <span class="sub-text">지원서 작성</span>
                    <h1 id="apply-job-title" class="form-title">Loading...</h1>
                </div>

                <form id="application-form" class="application-form">
                    <!-- Personal Info -->
                    <div class="form-section">
                        <h3 class="input-group-title">기본 정보 <span class="required">*</span></h3>
                        <div class="input-row">
                            <div class="input-group">
                                <label for="name">이름</label>
                                <input type="text" id="name" name="name" placeholder="이름을 입력해 주세요" required>
                            </div>
                            <div class="input-group">
                                <label for="email">이메일</label>
                                <input type="email" id="email" name="email" placeholder="example@mobyus.com" required>
                            </div>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label for="phone">연락처</label>
                                <input type="tel" id="phone" name="phone" placeholder="010-0000-0000"
                                    pattern="[0-9]{3}-[0-9]{3,4}-[0-9]{4}|[0-9]{10,11}" required>
                            </div>
                        </div>
                    </div>

                    <!-- Documents -->
                    <div class="form-section">
                        <h3 class="input-group-title">제출 서류 <span class="required">*</span></h3>
                        <div class="file-upload-box" id="resume-upload-box">
                            <input type="file" id="resume" name="resume" class="file-input" accept=".pdf,.doc,.docx"
                                required>
                            <div class="upload-content">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <p class="upload-text">이력서 / 경력기술서 업로드</p>
                                <p class="upload-hint">PDF, Word 형식 (최대 10MB)</p>
                            </div>
                            <div class="file-name" id="resume-name"></div>
                        </div>

                        <div class="file-upload-box" id="portfolio-upload-box" style="margin-top: 15px;">
                            <input type="file" id="portfolio" name="portfolio" class="file-input"
                                accept=".pdf,.ppt,.pptx">
                            <div class="upload-content">
                                <i class="fas fa-folder-plus"></i>
                                <p class="upload-text">포트폴리오 (선택)</p>
                                <p class="upload-hint">PDF, PPT 형식 (최대 30MB)</p>
                            </div>
                            <div class="file-name" id="portfolio-name"></div>
                        </div>
                    </div>

                    <!-- Additional Info -->
                    <div class="form-section">
                        <h3 class="input-group-title">추가 정보</h3>
                        <div class="input-group">
                            <label for="message">지원 동기 및 간단한 자기소개 (선택)</label>
                            <textarea id="message" name="message" rows="5" placeholder="자유롭게 작성해 주세요."></textarea>
                        </div>
                        <div class="input-group">
                            <label for="url">포트폴리오 URL (선택)</label>
                            <input type="url" id="url" name="url" placeholder="https://">
                        </div>
                    </div>

                    <!-- Agreement -->
                    <div class="form-section agreement-section">
                        <label class="checkbox-container">
                            <input type="checkbox" required>
                            <span class="checkmark"></span>
                            <span class="label-text">[필수] 개인정보 수집 및 이용에 동의합니다.</span>
                        </label>
                        <a href="#" class="link-text">내용 보기</a>
                    </div>

                    <!-- Submit Actions -->
                    <div class="form-actions text-center">
                        <button type="button" class="btn btn-outline" onclick="history.back()">취소</button>
                        <button type="submit" class="btn btn-primary submit-btn">제출하기</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer (Simple) -->
    <footer class="simple-footer text-center" style="padding: 40px 0; color: #888; font-size: 0.9rem;">
        <p>&copy; 2026 MOBYUS. All Rights Reserved.</p>
    </footer>

    <script src="scripts/main.js"></script>
</body>

</html>
