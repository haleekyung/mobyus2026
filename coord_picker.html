<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Visual Coordinate Picker</title>
    <style>
        body { background: #1e293b; color: white; font-family: 'Pretendard', sans-serif; text-align: center; margin: 0; padding: 20px; }
        #canvas-container {
            position: relative;
            width: 1000px; /* Fixed display width for tuning */
            margin: 20px auto;
            border: 2px solid #475569;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            user-select: none;
            background: #fff;
        }
        #bg-image {
            width: 100%;
            display: block;
            opacity: 0.5; /* Fade background so overlays stand out */
        }
        .draggable {
            position: absolute;
            cursor: grab;
            border: 1px dashed rgba(255,0,0,0.5);
            z-index: 10;
        }
        .draggable:hover {
            border: 2px solid #38bdf8;
            background: rgba(56, 189, 248, 0.2);
            z-index: 20;
        }
        .draggable:active {
            cursor: grabbing;
            z-index: 30;
        }
        .draggable img {
            width: 100%;
            display: block;
            pointer-events: none;
        }
        
        .hotspot-marker {
            background: rgba(56, 189, 248, 0.4);
            border: 2px dashed #38bdf8;
            resize: both;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }
        
        textarea {
            width: 90%;
            max-width: 1000px;
            height: 200px;
            margin-top: 20px;
            font-family: monospace;
            padding: 15px;
            background: #0f172a;
            color: #38bdf8;
            border: 1px solid #334155;
            border-radius: 8px;
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            margin: 0 10px;
        }
        button:hover { background: #7dd3fc; }
        .instructions { font-size: 1.1rem; margin-bottom: 20px; color: #cbd5e1; }
    </style>
</head>
<body>
    <h2>🎯 수동 좌표 튜닝 툴 (Visual Coordinate Picker)</h2>
    <p class="instructions">
        투명한 영역(핫스팟)을 만들려면 <b>[+ 투명 핫스팟 추가]</b> 버튼을 누르고 파란 박스를 배치/크기조절 하세요.<br>
        오른쪽 아래 모서리를 드래그하면 크기를 조절할 수 있습니다.<br>
        모두 완료 후 <b>[최종 코드 복사하기]</b> 버튼을 누르시면 됩니다!
    </p>
    
    <div>
        <button onclick="addHotspot()" style="background: #fbbf24;">+ 투명 핫스팟 추가</button>
        <button onclick="generateCode()">최종 코드 복사하기</button>
    </div>
    
    <div id="canvas-container">
        <!-- 베이스 이미지를 최신 super_tight.png 로 변경! -->
        <img id="bg-image" src="images/img_3layers_super_tight.png" alt="Base">
        <div class="draggable" id="Object_AFL_Clamp" style="left: 68.2164%; top: 72.8880%; width: 9.8095%;" title="Object_AFL_Clamp">
            <img src="images/3layers/04_Assets_Object/Object_AFL_Clamp.png" alt="Object_AFL_Clamp">
        </div>
        <div class="draggable" id="Object_AFL_Lift_01" style="left: 54.9510%; top: 81.0094%; width: 9.8095%;" title="Object_AFL_Lift_01">
            <img src="images/3layers/04_Assets_Object/Object_AFL_Lift_01.png" alt="Object_AFL_Lift_01">
        </div>
        <div class="draggable" id="Object_AFL_Lift_02" style="left: 25.5850%; top: 82.7169%; width: 9.6854%;" title="Object_AFL_Lift_02">
            <img src="images/3layers/04_Assets_Object/Object_AFL_Lift_02.png" alt="Object_AFL_Lift_02">
        </div>
        <div class="draggable" id="Object_AFL_Lift_03" style="left: 51.6917%; top: 70.6303%; width: 9.6441%;" title="Object_AFL_Lift_03">
            <img src="images/3layers/04_Assets_Object/Object_AFL_Lift_03.png" alt="Object_AFL_Lift_03">
        </div>
        <div class="draggable" id="Object_AFL_Pallet_01" style="left: 45.9438%; top: 85.1428%; width: 10.3063%;" title="Object_AFL_Pallet_01">
            <img src="images/3layers/04_Assets_Object/Object_AFL_Pallet_01.png" alt="Object_AFL_Pallet_01">
        </div>
        <div class="draggable" id="Object_AFL_Pallet_02" style="left: 11.8448%; top: 82.2845%; width: 10.2649%;" title="Object_AFL_Pallet_02">
            <img src="images/3layers/04_Assets_Object/Object_AFL_Pallet_02.png" alt="Object_AFL_Pallet_02">
        </div>
        <div class="draggable" id="Object_AMR_01" style="left: 30.0637%; top: 79.3845%; width: 6.4155%;" title="Object_AMR_01">
            <img src="images/3layers/04_Assets_Object/Object_AMR_01.png" alt="Object_AMR_01">
        </div>
        <div class="draggable" id="Object_AMR_02" style="left: 51.3309%; top: 80.2291%; width: 6.4155%;" title="Object_AMR_02">
            <img src="images/3layers/04_Assets_Object/Object_AMR_02.png" alt="Object_AMR_02">
        </div>
        <div class="draggable" id="Object_AMR_03" style="left: 41.5658%; top: 76.4820%; width: 6.4155%;" title="Object_AMR_03">
            <img src="images/3layers/04_Assets_Object/Object_AMR_03.png" alt="Object_AMR_03">
        </div>
        <div class="draggable" id="Object_AMR_04" style="left: 35.7132%; top: 70.8116%; width: 6.7467%;" title="Object_AMR_04">
            <img src="images/3layers/04_Assets_Object/Object_AMR_04.png" alt="Object_AMR_04">
        </div>
        <div class="draggable" id="Object_AMR_Manipulator" style="left: 38.1768%; top: 84.6568%; width: 7.6987%;" title="Object_AMR_Manipulator">
            <img src="images/3layers/04_Assets_Object/Object_AMR_Manipulator.png" alt="Object_AMR_Manipulator">
        </div>
        <div class="draggable" id="Object_CMS" style="left: 41.0378%; top: 39.0115%; width: 12.3344%;" title="Object_CMS">
            <img src="images/3layers/04_Assets_Object/Object_CMS.png" alt="Object_CMS">
        </div>
        <div class="draggable" id="Object_TAMS" style="left: 57.4515%; top: 39.1189%; width: 12.3344%;" title="Object_TAMS">
            <img src="images/3layers/04_Assets_Object/Object_TAMS.png" alt="Object_TAMS">
        </div>
        <div class="draggable" id="Object_TMS" style="left: 57.5147%; top: 44.9096%; width: 12.3344%;" title="Object_TMS">
            <img src="images/3layers/04_Assets_Object/Object_TMS.png" alt="Object_TMS">
        </div>
        <div class="draggable" id="Object_VMS" style="left: 65.8452%; top: 41.9349%; width: 12.3344%;" title="Object_VMS">
            <img src="images/3layers/04_Assets_Object/Object_VMS.png" alt="Object_VMS">
        </div>
        <div class="draggable" id="Object_WES" style="left: 44.3365%; top: 44.0350%; width: 12.3344%;" title="Object_WES">
            <img src="images/3layers/04_Assets_Object/Object_WES.png" alt="Object_WES">
        </div>
        <div class="draggable" id="Object_WMS" style="left: 50.0905%; top: 35.9506%; width: 12.3344%;" title="Object_WMS">
            <img src="images/3layers/04_Assets_Object/Object_WMS.png" alt="Object_WMS">
        </div>
    </div>
    
    <textarea id="output" readonly placeholder="버튼을 누르면 여기에 붙여넣을 코드가 생성됩니다..."></textarea>

    <script>
        const container = document.getElementById('canvas-container');
        let activeEl = null;
        let startX, startY, startLeft, startTop;
        let hotspotCount = 0;

        function addHotspot() {
            hotspotCount++;
            const div = document.createElement('div');
            div.className = 'draggable hotspot-marker';
            div.id = 'Hotspot_' + hotspotCount;
            div.style.left = '45%';
            div.style.top = '45%';
            div.style.width = '10%';
            div.style.height = '10%';
            div.innerHTML = '<span style="pointer-events:none;">핫스팟 ' + hotspotCount + '</span>';
            
            attachDragEvents(div);
            container.appendChild(div);
        }

        function attachDragEvents(el) {
            el.addEventListener('mousedown', e => {
                // If it's a hotspot and we clicked near the bottom-right corner, let the browser resize it instead of dragging
                if (el.classList.contains('hotspot-marker')) {
                    const rect = el.getBoundingClientRect();
                    if (e.clientX > rect.right - 20 && e.clientY > rect.bottom - 20) {
                        return; // Let the browser handle resize
                    }
                }
                
                document.querySelectorAll('.draggable').forEach(d => d.style.borderColor = 'rgba(255,0,0,0.5)');
                el.style.borderColor = '#facc15';
                
                activeEl = el;
                startX = e.clientX;
                startY = e.clientY;
                startLeft = parseFloat(el.style.left) || 0;
                startTop = parseFloat(el.style.top) || 0;
            });
        }

        // Add arrow key fine tuning
        window.addEventListener('keydown', e => {
            if (!activeEl) return;
            const step = e.shiftKey ? 0.5 : 0.05;
            let left = parseFloat(activeEl.style.left) || 0;
            let top = parseFloat(activeEl.style.top) || 0;
            
            if (e.key === 'ArrowLeft') left -= step;
            if (e.key === 'ArrowRight') left += step;
            if (e.key === 'ArrowUp') top -= step;
            if (e.key === 'ArrowDown') top += step;
            
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                activeEl.style.left = left.toFixed(4) + '%';
                activeEl.style.top = top.toFixed(4) + '%';
            }
        });

        document.querySelectorAll('.draggable').forEach(el => {
            attachDragEvents(el);
        });

        window.addEventListener('mousemove', e => {
            if (!activeEl || e.buttons !== 1) return;
            
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            const containerRect = container.getBoundingClientRect();
            
            const dxPct = (dx / containerRect.width) * 100;
            const dyPct = (dy / containerRect.height) * 100;
            
            activeEl.style.left = (startLeft + dxPct).toFixed(4) + '%';
            activeEl.style.top = (startTop + dyPct).toFixed(4) + '%';
        });

        document.addEventListener('mousedown', e => {
            if (!e.target.closest('.draggable') && e.target.id !== 'bg-image' && e.target.tagName !== 'BUTTON') {
                document.querySelectorAll('.draggable').forEach(d => d.style.borderColor = 'rgba(255,0,0,0.5)');
                activeEl = null;
            }
        });

        function generateCode() {
            let html = '                <div class="interactive-architecture" style="position: relative; width: 100%; max-width: 1000px; margin: 0 auto;">\n';
            html += '                    <img src="images/img_3layers_super_tight.png" alt="MOBYUS 3-Layer Architecture Base" style="width: 100%; display: block;">\n';
            
            const containerRect = container.getBoundingClientRect();
            
            document.querySelectorAll('.draggable').forEach(el => {
                const isHotspot = el.classList.contains('hotspot-marker');
                
                if (isHotspot) {
                    const rect = el.getBoundingClientRect();
                    const left = ((rect.left - containerRect.left) / containerRect.width * 100).toFixed(4) + '%';
                    const top = ((rect.top - containerRect.top) / containerRect.height * 100).toFixed(4) + '%';
                    const width = (rect.width / containerRect.width * 100).toFixed(4) + '%';
                    const height = (rect.height / containerRect.height * 100).toFixed(4) + '%';
                    
                    html += `                    <a href="#" class="arch-hotspot" data-tooltip="툴팁내용을바꿔주세요" style="position: absolute; left: ${left}; top: ${top}; width: ${width}; height: ${height};"></a>\n`;
                } else {
                    const id = el.id;
                    const left = el.style.left;
                    const top = el.style.top;
                    const width = el.style.width;
                    
                    // 기본 툴팁 텍스트 세팅
                    let tooltip = id;
                    if (id.includes('AMR_0')) tooltip = 'AMR (자율이동로봇)';
                    if (id.includes('AMR_Manipulator')) tooltip = 'AMR 매니퓰레이터';
                    if (id.includes('AFL_Lift')) tooltip = 'AFL 리프트';
                    if (id.includes('AFL_Pallet')) tooltip = 'AFL 파렛트';
                    if (id.includes('AFL_Clamp')) tooltip = 'AFL Clamp Type';
                    
                    html += `                    <a href="#" class="arch-layer-item" data-tooltip="${tooltip}" style="position: absolute; left: ${left}; top: ${top}; width: ${width}; display: block;">\n`;
                    html += `                        <img src="images/3layers/04_Assets_Object/${id}.png" alt="${id}" style="width: 100%; display: block;">\n`;
                    html += '                    </a>\n';
                }
            });
            
            html += '                </div>\n';
            
            const out = document.getElementById('output');
            out.value = html;
            out.select();
            document.execCommand('copy');
            alert('코드가 클립보드에 복사되었습니다!\n이 코드를 Antigravity에게 주시거나 직접 index_test.html에 반영하시면 됩니다.');
        }
    </script>
</body>
</html>
