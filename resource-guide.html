<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights — MOBYUS</title>
    <meta name="description" content="물류 자동화의 현장 경험과 미래 방향을 담은 MOBYUS의 기술 인사이트. 입문 가이드부터 테크 블로그까지.">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/insights.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Pretendard+Variable:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- i18n & Core scripts -->
    <script src="scripts/i18n-data.js"></script>
</head>

<body>
    <header id="gnb"></header>

    <main>
        <!-- Page Header (HERO) -->
        <section class="global-hero" style="background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('images/hero_insights_premium.png'); background-size: cover; background-position: center;">
            <div class="global-hero-inner fade-in">
                <p class="global-hero-category font-en" data-i18n="insights.hero.category">Insights</p>
                <div class="hero-title-row">
                    <h1 class="global-hero-title" data-i18n="insights.hero.title">현장의 깊이, 미래의 방향</h1>
                    <p class="global-hero-tagline font-en" data-i18n="insights.hero.tagline">Field Depth, Future Direction</p>
                </div>
                <p class="global-hero-sub-ko mt-3" data-i18n="insights.hero.sub_ko">990대+ 로봇 운영 경험에서 출발해, 물류 자동화의 내일을 설계합니다</p>
                <p class="global-hero-sub-en" data-i18n="insights.hero.sub_en">From 990+ robots in the field to designing tomorrow's logistics automation</p>
            </div>
        </section>

        <!-- Filter Bar -->
        <div class="insights-filter-container">
            <div class="insights-filter-tabs" id="filter-tabs"></div>
        </div>

        <!-- Insights Content -->
        <section class="insights-content">
            <div class="container">
                <div id="featured-container"></div>
                <div class="insights-grid" id="insights-grid"></div>
                <div class="insights-pagination" id="pagination"></div>
            </div>
        </section>

        <!-- Newsletter Section -->
        <section class="overview-section newsletter-footer">
            <div class="container">
                <div class="section-header text-center">
                    <h2 class="font-set-intro-title" data-i18n="insights.news.title">물류 자동화 인사이트, 놓치지 마세요.</h2>
                    <p class="font-set-intro-ko" style="margin-top: 24px;" data-i18n="insights.news.sub">일 1회, 엄선된 기술 정보와 산업 트렌드를 이메일로 받아보세요.</p>
                </div>
                <div class="newsletter-form">
                    <input type="email" placeholder="이메일을 입력하세요" id="newsletter-email" data-i18n-attr="placeholder:insights.news.placeholder">
                    <button onclick="handleNewsletterSubmit()" data-i18n="insights.news.btn">구독하기</button>
                </div>
            </div>
        </section>
    </main>

    <footer id="contact"></footer>

    <script src="scripts/main.js"></script>
    <script>
        // --- Page Specific Data: Insights ---
        const insightData = [
            { id: 'e1', cat: 'Technology', type: 'Starter Guide · E1', thumb: 'images/thumbnail_02.png', url: 'insight-detail.html', date: '2026.02.26', time: '10', featured: true },
            { id: 'case', cat: 'Industry', type: 'Case Study', thumb: 'images/thumbnail_01.png', url: 'insight-case-study.html', date: '2026.03.24', time: '12' },
            { id: 'eval', cat: 'Technology', type: 'Tech Blog', thumb: 'images/thumbnail_03.png', url: 'insight-detail-agv-amr.html', date: '2026.03.20', time: '12' },
            { id: 'e2', cat: 'Technology', type: 'Starter Guide', thumb: 'images/thumbnail_04.png', url: 'insight-detail-prep.html', date: '2026.02.26', time: '8' },
            { id: 'e3', cat: 'Technology', type: 'Starter Guide', thumb: 'images/thumbnail_05.png', url: 'insight-detail-roi.html', date: '2026.02.26', time: '12' },
            { id: 't1', cat: 'Technology', type: 'Tech Blog', thumb: 'images/thumbnail_06.png', url: 'insight-detail-tams.html', date: '2026.02.26', time: '8' },
            { id: 'twin', cat: 'Technology', type: 'Tech Blog', thumb: 'images/thumbnail_07.png', url: '#', date: '2026.02.26', time: '9', comingSoon: true },
            { id: 'sol4', cat: 'Product', type: 'Product Update', thumb: 'images/thumbnail_08.png', url: '#', date: '2026.02.26', time: '5', comingSoon: true }
        ];

        let currentCategory = 'All';
        let currentPage = 1;
        const itemsPerPage = 6;

        // --- Insights Rendering Logic ---
        window.renderInsights = function(category = 'All', page = 1) {
            currentCategory = category; currentPage = page;
            const lang = typeof getLanguage === 'function' ? getLanguage() : 'ko';
            const isEn = lang === 'en';
            const fontClass = isEn ? 'font-en' : '';
            const dicts = window.i18nData || { ko: {}, en: {} };
            const dictKo = dicts.ko; const dictEn = dicts.en; const activeDict = dicts[lang];

            const featuredContainer = document.getElementById('featured-container');
            const grid = document.getElementById('insights-grid');
            const filterContainer = document.getElementById('filter-tabs');
            const paginationContainer = document.getElementById('pagination');

            if (filterContainer) {
                const cats = [
                    { id: 'All', name: activeDict['insights.filter.all'] || '전체' },
                    { id: 'Technology', name: activeDict['insights.filter.technology'] || '기술' },
                    { id: 'Industry', name: activeDict['insights.filter.industry'] || '산업' },
                    { id: 'Product', name: activeDict['insights.filter.product'] || '제품' },
                    { id: 'Company', name: activeDict['insights.filter.company'] || '회사' }
                ];
                filterContainer.innerHTML = cats.map(c => `<button class="filter-chip ${currentCategory === c.id ? 'active' : ''}" onclick="renderInsights('${c.id}', 1)">${c.name}</button>`).join('');
            }

            const filtered = category === 'All' ? insightData : insightData.filter(i => i.cat === category);
            const featuredItem = insightData.find(i => i.featured);
            if (featuredContainer && (category === 'All' || featuredItem.cat === category) && page === 1) {
                const tKo = dictKo[`ins.${featuredItem.id}.title`];
                const tEn = dictEn[`ins.${featuredItem.id}.title`];
                const titleHtml = isEn ? tEn : `${tKo}<span class="featured-title-en font-en" style="display:block; margin-top:8px; font-size:1.1rem; color:#888;">${tEn}</span>`;
                featuredContainer.innerHTML = `
                    <a class="featured-card insight-item slide-up" href="${featuredItem.url}">
                        <div class="featured-thumb"><img src="${featuredItem.thumb}" alt="${tKo}"></div>
                        <div class="featured-body">
                            <span class="badge-type">${featuredItem.type}</span>
                            <h2 class="featured-title ${fontClass}">${titleHtml}</h2>
                            <p class="featured-desc ${fontClass}">${dictKo[`ins.${featuredItem.id}.desc`]}</p>
                            <div class="featured-meta">
                                <span><i class="far fa-calendar"></i> ${featuredItem.date}</span>
                                <span><i class="far fa-clock"></i> ${activeDict['insights.meta.read'] || ''} ${featuredItem.time}${activeDict['insights.meta.min'] || '분'}</span>
                            </div>
                        </div>
                    </a>`;
                featuredContainer.style.display = 'block';
            } else if (featuredContainer) { featuredContainer.style.display = 'none'; }

            const gridSource = filtered.filter(i => !(i.featured && (category === 'All' || i.cat === category) && page === 1));
            const totalPages = Math.ceil(gridSource.length / itemsPerPage);
            const start = (page - 1) * itemsPerPage;
            const paginated = gridSource.slice(start, start + itemsPerPage);

            grid.innerHTML = paginated.length > 0 ? paginated.map(item => {
                const tKo = dictKo[`ins.${item.id}.title`];
                const tEn = dictEn[`ins.${item.id}.title`];
                const titleHtml = isEn ? tEn : `${tKo}<span class="card-title-en font-en" style="display:block; margin-top:4px; font-size:0.9rem; color:#888; font-weight:400;">${tEn}</span>`;
                return `
                    <a class="insight-card insight-item fade-in" href="${item.url}" ${item.comingSoon ? `onclick="return showComingSoon(event)"` : ''}>
                        <div class="card-thumb"><img src="${item.thumb}" alt="${tKo}"></div>
                        <div class="card-body">
                            <span class="badge-type">${item.type}</span>
                            <h3 class="card-title ${fontClass}">${titleHtml}</h3>
                            <div class="card-tag">${activeDict[`insights.filter.${item.cat.toLowerCase()}`] || item.cat}</div>
                            <p class="card-desc ${fontClass}">${activeDict[`ins.${item.id}.desc`] || ''}</p>
                            <div class="card-meta">
                                <span><i class="far fa-calendar"></i> ${item.date}</span>
                                <span><i class="far fa-clock"></i> ${item.time}${activeDict['insights.meta.min'] || ''}</span>
                            </div>
                        </div>
                    </a>`;
            }).join('') : `<p class="no-results" style="grid-column: 1/-1; text-align: center; padding: 100px 0; color: #888;">${isEn ? 'No articles found.' : '검색된 콘텐츠가 없습니다.'}</p>`;

            if (paginationContainer) {
                if (totalPages <= 1) { paginationContainer.innerHTML = ""; } else {
                    let html = `<a href="#" class="page-nav ${page === 1 ? 'disabled' : ''}" onclick="event.preventDefault(); renderInsights('${category}', ${page - 1})"><i class="fas fa-arrow-left"></i> ${activeDict['insights.pagination.prev'] || ''}</a><div class="page-numbers">`;
                    for(let i=1; i<=totalPages; i++) { html += `<a href="#" class="page-num ${i === page ? 'active' : ''}" onclick="event.preventDefault(); renderInsights('${category}', ${i})">${i}</a>`; }
                    html += `</div><a href="#" class="page-nav ${page === totalPages ? 'disabled' : ''}" onclick="event.preventDefault(); renderInsights('${category}', ${page + 1})">${activeDict['insights.pagination.next'] || ''} <i class="fas fa-arrow-right"></i></a>`;
                    paginationContainer.innerHTML = html;
                }
            }
        };

        window.showComingSoon = function(e) {
            e.preventDefault();
            const lang = typeof getLanguage === 'function' ? getLanguage() : 'ko';
            const msg = (window.i18nData[lang] && window.i18nData[lang]['coming.soon']) || '준비 중입니다.';
            const existing = document.querySelector('.coming-soon-toast'); if (existing) existing.remove();
            const toast = document.createElement('div'); toast.className = 'coming-soon-toast';
            toast.style.cssText = `position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 14px 28px; border-radius: 50px; font-weight: 500; font-size: 0.95rem; z-index: 9999; box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: toastIn 0.3s ease;`;
            toast.textContent = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); return false;
        };

        window.handleNewsletterSubmit = function() {
            const email = document.getElementById('newsletter-email').value;
            const lang = typeof getLanguage === 'function' ? getLanguage() : 'ko';
            if (!email || !email.includes('@')) { alert(lang === 'ko' ? '올바른 이메일을 입력해주세요.' : 'Please enter a valid email.'); return; }
            alert(lang === 'ko' ? `감사합니다! ${email} 으로 뉴스레터를 발송해 드립니다.` : `Thank you! We will send the newsletter to ${email}.`);
            document.getElementById('newsletter-email').value = '';
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderInsights('All', 1);

            // Listen for global language changes from main.js
            window.addEventListener('languageChanged', (e) => {
                const lang = e.detail.lang;
                if (lang === 'en') document.body.classList.add('lang-en');
                else document.body.classList.remove('lang-en');
                
                // Re-render insights with the new language
                renderInsights(currentCategory, currentPage);
            });
            
            // Set initial body class if needed
            const initialLang = typeof getLanguage === 'function' ? getLanguage() : 'ko';
            if (initialLang === 'en') document.body.classList.add('lang-en');
        });
    </script>
</body>

</html>
